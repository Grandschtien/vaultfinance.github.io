<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Privacy Policy - Vault Finance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f7f7f8;
      color: #111827;
      line-height: 1.6;
    }

    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 32px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      line-height: 1.2;
    }

    p {
      font-size: 16px;
    }

    .language-list {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    a.language-link {
      display: block;
      padding: 16px 18px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      color: #111827;
      text-decoration: none;
      background: #ffffff;
    }

    a.language-link:hover {
      background: #f3f4f6;
    }

    footer {
      margin-top: 32px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Privacy Policy</h1>
    <p>Please choose your language.</p>

    <div class="language-list">
      <a class="language-link" href="/privacy/en/">English</a>
      <a class="language-link" href="/privacy/ru/">Русский</a>
    </div>

    <footer>
      Vault Finance · support@moneyvaultapp.com
    </footer>
  </main>
</body>
</html>
